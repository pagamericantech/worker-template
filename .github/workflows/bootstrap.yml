name: Bootstrap app registration

# Roda manualmente UMA vez no repo recém-criado a partir do template.
# Abre PR em platform-applications scaffoldando apps/<app>/{argocd,vault}/terragrunt.hcl
# e depois deleta esse próprio workflow.
#
# Pré-req: GitHub App ORG_GITOPS_BOT instalado em pagamericantech com permissão
# Contents: Write + Pull requests: Write em platform-applications.

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Cluster alvo (vira label apps.deploy/<target_env>=true e mount Vault)
        required: true
        type: choice
        default: shared-services
        options:
          - shared-services
          - payments
          - staging
          - workspace
      owner:
        description: Time/squad responsável (preenche labels owner/support no chart values)
        required: true
        type: string
      language:
        description: Linguagem da app (preenche application.language no chart values)
        required: true
        type: choice
        default: node
        options:
          - go
          - node
          - python
      nodepool:
        description: Karpenter NodePool (vira nodeSelector + toleration workload=<choice>)
        required: true
        type: choice
        default: noncritical
        options:
          - noncritical
          - critical

permissions:
  contents: write

env:
  CHART_NAME: platform-k8s-worker-chart
  REGISTRY_REPO: pagamericantech/platform-applications

jobs:
  register:
    runs-on: ubuntu-latest
    # Guard duplo: evita rodar no template original.
    if: github.repository != 'pagamericantech/worker-template'
    steps:
      - name: Compute app metadata
        id: meta
        run: |
          APP_NAME="${GITHUB_REPOSITORY##*/}"
          echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "target_cluster=k8s-${{ inputs.target_env }}" >> "$GITHUB_OUTPUT"
          echo "branch=bootstrap/register-${APP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Mint app token (write em platform-applications + self-destruct neste repo)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ORG_GITOPS_BOT_APP_ID }}
          private-key: ${{ secrets.ORG_GITOPS_BOT_PRIVATE_KEY }}
          owner: pagamericantech
          repositories: |
            platform-applications
            ${{ github.event.repository.name }}

      - name: Resolve bot identity
        id: bot
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const slug = '${{ steps.app-token.outputs.app-slug }}';
            const { data } = await github.rest.users.getByUsername({ username: `${slug}[bot]` });
            core.setOutput('name', `${slug}[bot]`);
            core.setOutput('email', `${data.id}+${slug}[bot]@users.noreply.github.com`);

      - name: Checkout platform-applications
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REGISTRY_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: platform-applications
          fetch-depth: 0

      - name: Bail out if app já registrado
        working-directory: platform-applications
        run: |
          if [ -d "apps/${{ steps.meta.outputs.app_name }}" ]; then
            echo "::error::apps/${{ steps.meta.outputs.app_name }} já existe em ${REGISTRY_REPO}. Aborta."
            exit 1
          fi

      - name: Scaffold apps/<app>/argocd + vault
        working-directory: platform-applications
        env:
          APP_NAME: ${{ steps.meta.outputs.app_name }}
          TARGET_ENV: ${{ inputs.target_env }}
          TARGET_CLUSTER: ${{ steps.meta.outputs.target_cluster }}
          CHART_NAME: ${{ env.CHART_NAME }}
        run: |
          set -euo pipefail
          mkdir -p "apps/${APP_NAME}/argocd" "apps/${APP_NAME}/vault"

          cat > "apps/${APP_NAME}/argocd/terragrunt.hcl" <<HCL
          include "root" {
            path = find_in_parent_folders("root.hcl")
          }

          locals {
            region_vars = read_terragrunt_config(find_in_parent_folders("region.hcl"))
            env_vars    = read_terragrunt_config(find_in_parent_folders("env.hcl"))

            app_name = "${APP_NAME}"

            chart_registry = "946819142358.dkr.ecr.us-east-1.amazonaws.com/charts"
            chart_name     = "${CHART_NAME}"
            chart_version  = "1.x.x"

            target_env = "${TARGET_ENV}"

            # k8s-staging carrega apps.deploy/payments=true e apps.deploy/workspace=true
            # (ver platform-infrastructure/.../argocd-clusters/terragrunt.hcl), entao o AS
            # ja fanouta pra staging nesses envs. AppProject precisa permitir esses destinos.
            staging_mirrored_envs = ["workspace", "payments"]
            uses_release_flow     = contains(local.staging_mirrored_envs, local.target_env)
            target_clusters = concat(
              ["k8s-\${local.target_env}"],
              local.uses_release_flow ? ["k8s-staging"] : [],
            )
            # targetRevision do source de values: cluster com env=staging tracka `main` (CD continuo
            # de staging); env=production tracka branch `release` (force-pushed pelo release.yml).
            # Apps sem mirror em staging (so um cluster) sempre trackeam main.
            target_revision = local.uses_release_flow ? "{{if eq .metadata.labels.env \"staging\"}}main{{else}}release{{end}}" : "main"
          }

          terraform {
            source = "../../../../platform-infrastructure/modules/argocd-applicationset"
          }

          inputs = {
            name             = local.app_name
            namespace        = "argocd"
            hub_cluster_name = local.region_vars.locals.hub_cluster_name

            go_template = true

            generators = [
              {
                clusters = {
                  selector = {
                    matchLabels = {
                      "apps.deploy/\${local.target_env}" = "true"
                    }
                  }
                }
              }
            ]

            template = {
              metadata = {
                name = "\${local.app_name}-{{trimPrefix \"k8s-\" .name}}"
                labels = {
                  app = local.app_name
                }
              }
              spec = {
                project = local.app_name

                sources = [
                  {
                    repoURL        = local.chart_registry
                    chart          = local.chart_name
                    targetRevision = local.chart_version
                    helm = {
                      releaseName             = local.app_name
                      ignoreMissingValueFiles = true
                      valueFiles = [
                        "\$values/chart/values.yaml",
                        "\$values/chart/values-{{.name}}.yaml",
                      ]
                    }
                  },
                  {
                    repoURL        = "https://github.com/pagamericantech/\${local.app_name}.git"
                    targetRevision = local.target_revision
                    ref            = "values"
                  },
                ]

                destination = {
                  name      = "{{.name}}"
                  namespace = local.app_name
                }
                syncPolicy = {
                  automated = {
                    prune    = true
                    selfHeal = true
                  }
                  syncOptions = [
                    "CreateNamespace=true",
                    "ServerSideApply=true",
                  ]
                }
                ignoreDifferences = [
                  {
                    group = "gateway.networking.k8s.io"
                    kind  = "HTTPRoute"
                    jqPathExpressions = [
                      ".spec.parentRefs[]?.group",
                      ".spec.parentRefs[]?.kind",
                      ".spec.rules[]?.backendRefs",
                    ]
                  },
                ]
              }
            }

            labels = merge(local.region_vars.locals.tags, {
              app        = local.app_name
              CostCenter = local.target_env
            })

            project_destinations = [
              for c in local.target_clusters : {
                name      = c
                namespace = local.app_name
              }
            ]
            project_source_repos = [
              local.chart_registry,
              "https://github.com/pagamericantech/\${local.app_name}.git",
            ]
            project_description = "Runtime application project for \${local.app_name}"
          }
          HCL

          cat > "apps/${APP_NAME}/vault/terragrunt.hcl" <<HCL
          include "root" {
            path = find_in_parent_folders("root.hcl")
          }

          locals {
            app_name   = "${APP_NAME}"
            target_env = "${TARGET_ENV}"

            # Mounts Vault onde criar subpath. Cada cluster tem seu proprio kubernetes auth
            # backend, entao mirror em staging precisa de subpath proprio. Mesma regra do
            # AppProject — ver platform-infrastructure/.../argocd-clusters/terragrunt.hcl.
            staging_mirrored_envs = ["workspace", "payments"]
            target_clusters = concat(
              [local.target_env],
              contains(local.staging_mirrored_envs, local.target_env) ? ["staging"] : [],
            )
          }

          terraform {
            source = "../../../../platform-infrastructure/modules/vault-kv-app"
          }

          inputs = {
            app_name    = local.app_name
            mount_paths = local.target_clusters

            create_kubernetes_role = false
          }
          HCL

      - name: Commit + push branch
        working-directory: platform-applications
        env:
          BRANCH: ${{ steps.meta.outputs.branch }}
          APP_NAME: ${{ steps.meta.outputs.app_name }}
        run: |
          set -euo pipefail
          git config user.name  "${{ steps.bot.outputs.name }}"
          git config user.email "${{ steps.bot.outputs.email }}"
          git checkout -b "${BRANCH}"
          git add "apps/${APP_NAME}"
          git commit -m "feat(${APP_NAME}): register app via bootstrap from ${GITHUB_REPOSITORY}"
          git push origin "${BRANCH}" --force-with-lease

      - name: Open PR
        working-directory: platform-applications
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.meta.outputs.branch }}
          APP_NAME: ${{ steps.meta.outputs.app_name }}
          TARGET_ENV: ${{ inputs.target_env }}
        run: |
          set -euo pipefail
          gh pr create \
            --repo "${REGISTRY_REPO}" \
            --base main \
            --head "${BRANCH}" \
            --title "feat(${APP_NAME}): register app (target_env=${TARGET_ENV})" \
            --body "Auto-bootstrap a partir de https://github.com/${GITHUB_REPOSITORY}.

          Cria \`apps/${APP_NAME}/argocd\` + \`apps/${APP_NAME}/vault\`.

          - chart: \`${CHART_NAME}\`
          - target_env: \`${TARGET_ENV}\`
          - target_clusters: derivado de \`target_env\` (\`workspace\`/\`payments\` incluem \`k8s-staging\` como mirror; \`shared-services\` so o hub)

          Revise antes de mergear: bumpe \`chart_version\` e confirme que o cluster Secret tem o label \`apps.deploy/${TARGET_ENV}=true\` (em platform-infrastructure)."

      - name: Checkout source repo (pra patch + self-destruct)
        uses: actions/checkout@v4
        with:
          path: source-repo
          token: ${{ steps.app-token.outputs.token }}

      - name: Patch build_and_deploy + chart values + self-destruct (single commit)
        working-directory: source-repo
        env:
          APP_NAME: ${{ steps.meta.outputs.app_name }}
          TARGET_ENV: ${{ inputs.target_env }}
          OWNER: ${{ inputs.owner }}
          LANGUAGE: ${{ inputs.language }}
          NODEPOOL: ${{ inputs.nodepool }}
        run: |
          set -euo pipefail
          git config user.name  "${{ steps.bot.outputs.name }}"
          git config user.email "${{ steps.bot.outputs.email }}"

          sed -i "s|image_name: __IMAGE_NAME__|image_name: ${APP_NAME}|" .github/workflows/build_and_deploy.yaml

          # Apps com mirror em staging (workspace/payments) bumpam o values do staging
          # — main vira CD continuo de staging. Prod fica congelado ate Fase 2 (release.yml)
          # automatizar a promocao. Apps sem mirror (staging/shared-services) usam o values
          # primario direto (nao tem separacao integration/prod).
          case "${TARGET_ENV}" in
            workspace|payments) DEPLOY_VALUES="chart/values-k8s-staging.yaml" ;;
            *) DEPLOY_VALUES="chart/values-k8s-${TARGET_ENV}.yaml" ;;
          esac
          sed -i -E "s|values_file: chart/values-k8s-[a-z0-9-]+\.yaml|values_file: ${DEPLOY_VALUES}|" .github/workflows/build_and_deploy.yaml

          if [ -f "chart/values-k8s-aws-account.yaml" ]; then
            git mv "chart/values-k8s-aws-account.yaml" "chart/values-k8s-${TARGET_ENV}.yaml"
          fi
          VALUES_FILE="chart/values-k8s-${TARGET_ENV}.yaml"
          if [ -f "$VALUES_FILE" ]; then
            sed -i "s|__IMAGE_NAME__|${APP_NAME}|g" "$VALUES_FILE"
            sed -i "s|__APP_NAME__|${APP_NAME}|g" "$VALUES_FILE"
            sed -i "s|__OWNER__|${OWNER}|g" "$VALUES_FILE"
            sed -i "s|__LANGUAGE__|${LANGUAGE}|g" "$VALUES_FILE"
            sed -i "s|__NODEPOOL__|${NODEPOOL}|g" "$VALUES_FILE"
            # Path dentro do mount Vault. Mount = cluster, configurado no
            # ClusterSecretStore — o `key` é só o path relativo. Mesma key que o
            # agent Datadog consome (api-key + app-key + site) e o módulo
            # `datadog-bootstrap` em platform-infrastructure popula.
            sed -i "s|__DATADOG_REMOTE_KEY__|datadog/api|g" "$VALUES_FILE"
            sed -i "s|k8s-aws-account|k8s-${TARGET_ENV}|g" "$VALUES_FILE"

            # Quando o cluster alvo eh o proprio staging, o values precisa refletir
            # env/environment=staging. Pros mirrors (workspace/payments) o ajuste e
            # feito no bloco de copia logo abaixo.
            if [ "${TARGET_ENV}" = "staging" ]; then
              sed -i "s|env: production|env: staging|" "$VALUES_FILE"
              sed -i "s|environment: production|environment: staging|" "$VALUES_FILE"
            fi
          fi

          # Mirror pra staging quando target_env e workspace ou payments — mesma regra
          # do AppProject e do vault. Cria values-k8s-staging.yaml como copia do primario,
          # trocando referencias do cluster alvo. Override de tamanho/tags fica pra
          # revisao manual depois do bootstrap.
          case "${TARGET_ENV}" in
            workspace|payments)
              if [ -f "$VALUES_FILE" ]; then
                STAGING_FILE="chart/values-k8s-staging.yaml"
                cp "$VALUES_FILE" "$STAGING_FILE"
                sed -i "s|k8s-${TARGET_ENV}|k8s-staging|g" "$STAGING_FILE"
                # Marca explicitamente o ambiente — o values primario tem
                # env/environment=production e o mirror precisa refletir staging.
                sed -i "s|env: production|env: staging|" "$STAGING_FILE"
                sed -i "s|environment: production|environment: staging|" "$STAGING_FILE"
                git add "$STAGING_FILE"
              fi
              ;;
          esac

          # release.yml so faz sentido em apps com mirror staging→prod (workspace/payments).
          # Apps sem mirror nao tem promocao e o arquivo deve ser removido.
          case "${TARGET_ENV}" in
            workspace|payments)
              sed -i "s|__TARGET_ENV__|${TARGET_ENV}|g" .github/workflows/release.yml
              ;;
            *)
              git rm .github/workflows/release.yml
              ;;
          esac

          # CODEOWNERS — protege os values do chart, que sao mantidos pelos workflows
          # build_and_deploy.yaml (bump em staging) e release.yml (bump em primario).
          # Edicao humana nesses arquivos conflita com os bumps automaticos.
          mkdir -p .github
          cat > .github/CODEOWNERS <<CODEOWNERS
          # Values do chart sao mantidos pelos workflows (build_and_deploy.yaml + release.yml).
          # Edicao humana exige review dos times de plataforma e engenharia.
          chart/values-k8s-*.yaml @pagamericantech/infrastructure @pagamericantech/engineering
          CODEOWNERS
          git add .github/CODEOWNERS

          git rm .github/workflows/bootstrap.yml

          git commit -am "chore: bootstrap complete — registered in ${REGISTRY_REPO} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

          # Cria branch `release` apontando pro mesmo SHA do main pra apps com mirror
          # staging→prod. ArgoCD prod (workspace/payments) tracka essa branch via
          # targetRevision condicional. Inicialmente release == main; release.yml
          # avanca essa branch quando engenheiro promove de staging.
          case "${TARGET_ENV}" in
            workspace|payments)
              git push origin HEAD:release
              echo "::notice::Branch 'release' criada apontando pro main HEAD."

              # Tenta criar ruleset que protege a branch (bypass apenas pro pagamerican-gitops
              # app). Pode falhar se o token nao tem permissao Administration:Write —
              # nesse caso, emite warning pra criacao manual.
              cat > /tmp/release-ruleset.json <<RULESET
          {
            "name": "Protect release branch",
            "target": "branch",
            "enforcement": "active",
            "conditions": {"ref_name": {"include": ["refs/heads/release"], "exclude": []}},
            "rules": [{"type": "deletion"}, {"type": "non_fast_forward"}],
            "bypass_actors": [{"actor_id": 3467660, "actor_type": "Integration", "bypass_mode": "always"}]
          }
          RULESET
              if GH_TOKEN="${{ steps.app-token.outputs.token }}" gh api \
                "repos/${GITHUB_REPOSITORY}/rulesets" \
                --method POST --input /tmp/release-ruleset.json >/dev/null 2>&1; then
                echo "::notice::Ruleset 'Protect release branch' criado (bypass: pagamerican-gitops)."
              else
                echo "::warning::Nao foi possivel criar o ruleset automaticamente (token sem Administration:Write?). Crie manualmente em Settings → Rules → Rulesets com bypass pro app pagamerican-gitops."
              fi
              ;;
          esac
