# Chart: https://github.com/pagamericantech/platform-charts/tree/main/platform-k8s-worker-chart
#
# Override values pra deploy do worker __APP_NAME__ no cluster k8s-shared-services.
# Workers consomem fila/eventos — sem entrada HTTP. `image.tag` é atualizado pelo
# workflow .github/workflows/build_and_deploy.yaml após cada build de main.

image:
  repository: 946819142358.dkr.ecr.us-east-1.amazonaws.com/__IMAGE_NAME__
  pullPolicy: IfNotPresent
  tag: "REPLACE_ME"
replicaCount: 1
labels:
  cost-center: shared-services
  env: production
  project: __APP_NAME__
  owner: __OWNER__
  support: __OWNER__
  github-org: pagamericantech
  github-repo: __APP_NAME__
annotations:
  documentation: https://github.com/pagamericantech/__APP_NAME__
application:
  name: __APP_NAME__
  language: __LANGUAGE__
  environment: production
# Node placement — NodePools `noncritical`/`critical` têm taint
# `workload=<name>:NoSchedule`, então precisa de label match (nodeSelector)
# E toleration ao mesmo tempo. nodepool é escolhido no bootstrap.
nodeSelector:
  workload: __NODEPOOL__
tolerations:
  - key: workload
    operator: Equal
    value: __NODEPOOL__
    effect: NoSchedule
cloudProviders:
  aws:
    enabled: true
    # Pull de ECR via IRSA/PodIdentity do namespace — não precisa de imagePullSecret.
    imagePullSecrets: {}
secrets:
  keys: []
  remoteKey: ""
datadog:
  enabled: false
# Autoscaling via KEDA (ScaledObject). Workers tipicamente escalam por profundidade
# de fila (kafka/sqs/rabbitmq). CPU/memory são fallback razoável; troque/some
# triggers conforme a fila — schema completo em values.yaml do platform-k8s-worker-chart.
autoscaling:
  enabled: true
  maxReplicas: 5
  cpu:
    # https://keda.sh/docs/2.9/scalers/cpu/
    target: "80"
    metricType: Utilization
  memory:
    # https://keda.sh/docs/2.9/scalers/memory/
    target: "80"
    metricType: Utilization
  # Exemplo de trigger SQS (descomentar e ajustar):
  # sqs:
  #   queueURL: https://sqs.us-east-1.amazonaws.com/946819142358/__APP_NAME__-queue
  #   queueLength: "10"
  #   awsRegion: us-east-1
