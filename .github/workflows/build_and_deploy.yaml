name: Build and Deploy

on:
  push:
    branches:
      - main
    # Mudanças em chart/** não disparam rebuild — o values é consumido pelo
    # ArgoCD diretamente. Inclui o auto-commit da própria pipeline (que bumpa
    # image.tag no values) e edições manuais de override.
    paths-ignore:
      - "chart/**"
      - "**.md"

permissions:
  id-token: write
  contents: write

jobs:
  # Gate: enquanto bootstrap.yml existir, o repo ainda não foi registrado em
  # platform-applications. Bloqueia o build/deploy até o bootstrap se autodeletar.
  precheck:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f .github/workflows/bootstrap.yml ]; then
            echo "::warning::Skipping deploy — rode o workflow 'Bootstrap app registration' primeiro pra registrar o app em platform-applications."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: precheck
    if: needs.precheck.outputs.ready == 'true'
    uses: pagamericantech/platform-workflows/.github/workflows/_reusable-docker-build-push.yml@main
    with:
      image_name: __IMAGE_NAME__
      values_file: chart/values-k8s-shared-services.yaml
      # Nodepool critical ou noncritical utilizam arm64 (Graviton).
      # Runner self-hosted também é arm64, então build é nativo (sem QEMU).
      platform: linux/arm64
      # Notifica platform-infrastructure via repository_dispatch quando um repo
      # ECR novo é criado — o listener ecr-addons-apply aplica cross-account
      # policy + lifecycle.
      dispatch_repo: pagamericantech/platform-infrastructure
      dispatch_app_id: ${{ vars.ORG_DISPATCH_APP_ID }}
    secrets: inherit
